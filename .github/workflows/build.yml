name: Build Tests

# Level-2 model-build tests (make_emc() for all 5 models + recovery build
# chain; no MCMC). These are intrinsically slow because EMC2::design() takes
# ~minutes per model, so they do NOT run on every push. Instead:
#   - nightly schedule (03:00 UTC), and
#   - manual dispatch (Actions tab -> "Build Tests" -> "Run workflow").
# Level-1 unit tests remain the fast per-push gate (.github/workflows/test.yml).
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build-tests:
    name: "L2 · model build tests"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # pre-compiled binaries; avoids compiling from source

      - name: Cache R packages (L2)
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-l2-${{ runner.os }}-${{ hashFiles('.github/r-deps-level2.txt') }}
          restore-keys: r-l2-${{ runner.os }}-

      - name: Install level-2 dependencies
        run: Rscript -e "install.packages('pak', repos='https://r-lib.github.io/p/pak/stable/'); pak::pkg_install(readLines('.github/r-deps-level2.txt'))"

      - name: Run level-2 tests (includes level-1)
        env:
          TEST_LEVEL: "2"
        run: Rscript __tests__/run_tests.R
