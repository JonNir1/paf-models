name: Tests

on:
  push:
    branches: [main, analysis1]
  pull_request:
    branches: [main, analysis1]

# Only Level-1 unit tests run on push/PR (fast, no EMC2). Level-2 model-build
# tests are intrinsically slow (EMC2::design() is ~minutes per model) and run
# on a schedule / manual dispatch via `.github/workflows/build.yml`.
jobs:
  # ------------------------------------------------------------
  # Level-1 unit tests — no EMC2, always fast (~1 min)
  # ------------------------------------------------------------
  unit-tests:
    name: "L1 · unit tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # pre-compiled binaries; avoids compiling from source

      - name: Cache R packages (L1)
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-l1-${{ runner.os }}-${{ hashFiles('.github/r-deps-level1.txt') }}
          restore-keys: r-l1-${{ runner.os }}-

      - name: Install level-1 dependencies
        run: Rscript -e "install.packages('pak', repos='https://r-lib.github.io/p/pak/stable/'); pak::pkg_install(readLines('.github/r-deps-level1.txt'))"

      - name: Run level-1 tests
        run: Rscript __tests__/run_tests.R
