name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------
  # Job 1: Level-1 unit tests — no EMC2, always fast (~1 min)
  # ------------------------------------------------------------
  unit-tests:
    name: "L1 · unit tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true   # pre-compiled binaries; avoids compiling from source

      - name: Cache R packages (L1)
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-l1-${{ runner.os }}-${{ hashFiles('.github/r-deps-level1.txt') }}
          restore-keys: r-l1-${{ runner.os }}-

      - name: Install level-1 dependencies
        run: Rscript -e "install.packages('pak', repos='https://r-lib.github.io/p/pak/stable/'); pak::pkg_install(readLines('.github/r-deps-level1.txt'))"

      - name: Run level-1 tests
        run: Rscript __tests__/run_tests.R

  # ------------------------------------------------------------
  # Job 2: Level-2 model-build tests — requires EMC2 (~10-15 min)
  # ------------------------------------------------------------
  build-tests:
    name: "L2 · model build tests"
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages (L2)
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-l2-${{ runner.os }}-${{ hashFiles('.github/r-deps-level2.txt') }}
          restore-keys: r-l2-${{ runner.os }}-

      - name: Install level-2 dependencies
        run: Rscript -e "install.packages('pak', repos='https://r-lib.github.io/p/pak/stable/'); pak::pkg_install(readLines('.github/r-deps-level2.txt'))"

      - name: Run level-2 tests
        env:
          TEST_LEVEL: "2"
        run: Rscript __tests__/run_tests.R
