name: Smoke Tests

# NOTE (analysis1 branch): dispatch and select the `analysis1` branch to run the
# frozen model1-5 smoke tests as a guard for this branch.
on:
  workflow_dispatch:   # manual trigger only — run before releases or after major model changes

jobs:
  smoke-tests:
    name: "L3 · fit smoke tests"
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages (L2 deps, reused by smoke)
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-l2-${{ runner.os }}-${{ hashFiles('.github/r-deps-level2.txt') }}
          restore-keys: r-l2-${{ runner.os }}-

      - name: Install dependencies
        run: Rscript -e "install.packages('pak', repos='https://r-lib.github.io/p/pak/stable/'); pak::pkg_install(readLines('.github/r-deps-level2.txt'))"

      - name: Run smoke tests
        env:
          TEST_LEVEL: "3"
        run: Rscript __tests__/run_tests.R
